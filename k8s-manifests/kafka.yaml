apiVersion: v1
kind: Service
metadata:
  name: my-kafka
  namespace: parkit
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - name: internal
    protocol: TCP
    port: 9092
    targetPort: 9092
  - name: controller
    protocol: TCP
    port: 9093
    targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: my-kafka-external
  namespace: parkit
spec:
  selector:
    app: kafka
  ports:
  - name: external-0
    protocol: TCP
    port: 9094
    targetPort: 9094
    nodePort: 30092
  - name: external-1
    protocol: TCP
    port: 9095
    targetPort: 9095
    nodePort: 30093
  - name: external-2
    protocol: TCP
    port: 9096
    targetPort: 9096
    nodePort: 30094
  type: NodePort
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-broker
  namespace: parkit
spec:
  serviceName: my-kafka
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: kafka
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 0
        fsGroup: 0
      initContainers:
      - name: init-node-id
        image: busybox
        command:
        - sh
        - -c
        - |
          INDEX=${MY_POD_NAME##*-}
          echo $INDEX > /mnt/node-id
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: node-id
          mountPath: /mnt
      containers:
      - name: kafka
        image: public.ecr.aws/bitnami/kafka:3.6.1-debian-11-r0
        command:
        - sh
        - -c
        - |
          export KAFKA_CFG_NODE_ID=$(cat /mnt/node-id)
          export KAFKA_CFG_ADVERTISED_LISTENERS="PLAINTEXT://$(MY_POD_NAME).my-kafka.parkit.svc.cluster.local:9092,EXTERNAL://192.168.201.98:$((50031 + $(cat /mnt/node-id)))"
          exec /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KAFKA_CFG_PROCESS_ROLES
          value: "controller,broker"
        - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
          value: "0@kafka-broker-0.my-kafka.parkit.svc.cluster.local:9093,1@kafka-broker-1.my-kafka.parkit.svc.cluster.local:9093,2@kafka-broker-2.my-kafka.parkit.svc.cluster.local:9093"
        - name: KAFKA_CFG_LISTENERS
          value: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
        - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
        - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "yes"
        - name: KAFKA_KRAFT_CLUSTER_ID
          value: "L69In9iZQu69V99A99999w"
        volumeMounts:
        - name: data
          mountPath: /bitnami/kafka
        - name: node-id
          mountPath: /mnt
      volumes:
      - name: node-id
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 2Gi